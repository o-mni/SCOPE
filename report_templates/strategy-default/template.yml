id: strategy-default
name: Assessment Strategy Plan
version: "1.0"
template_type: strategy
builtin: true
description: >
  Default template for generating a structured assessment strategy plan.
  Defines the scope, phasing, module selection, risk acceptance criteria,
  and stakeholder responsibilities prior to running a full assessment.

sections:
  - id: cover
    title: Cover Page
    required: true
  - id: purpose
    title: Purpose & Objectives
    required: true
  - id: scope
    title: Assessment Scope
    required: true
    subsections:
      - id: in_scope
        title: In Scope
      - id: out_of_scope
        title: Out of Scope
      - id: constraints
        title: Constraints & Assumptions
  - id: methodology
    title: Methodology
    required: true
    subsections:
      - id: phases
        title: Assessment Phases
      - id: modules
        title: Planned Modules
      - id: tools
        title: Tools & Techniques
  - id: schedule
    title: Schedule & Milestones
    required: false
  - id: risk_acceptance
    title: Risk Acceptance Criteria
    required: true
  - id: roles
    title: Roles & Responsibilities
    required: true
  - id: deliverables
    title: Expected Deliverables
    required: true
  - id: approval
    title: Approval & Sign-off
    required: false
  - id: disclaimer
    title: Disclaimer
    required: true

branding:
  logo: null
  primary_color: "#0f3460"
  accent_color: "#533483"
  font_family: "Inter, 'Segoe UI', sans-serif"
  report_header: "SCOPE Assessment Strategy"
  report_footer: "Generated by SCOPE — Security Configuration Observation and Protection Engine"

severity_labels:
  critical:
    label: Critical
    color: "#c0392b"
    badge_color: "#fff"
  high:
    label: High
    color: "#e67e22"
    badge_color: "#fff"
  medium:
    label: Medium
    color: "#f1c40f"
    badge_color: "#222"
  low:
    label: Low
    color: "#2980b9"
    badge_color: "#fff"
  informational:
    label: Info
    color: "#7f8c8d"
    badge_color: "#fff"

risk_thresholds:
  auto_remediate: []
  require_approval:
    - critical
    - high
  log_only:
    - medium
    - low
    - informational

disclaimer: >
  This Assessment Strategy Plan is a pre-engagement document generated by
  SCOPE to outline the planned approach for a security assessment. It does
  not constitute a legal authorisation to conduct testing. Prior written
  approval from the system owner must be obtained before any assessment
  is initiated. This document is for internal planning purposes only and
  should be treated as confidential.

render:
  page_size: A4
  orientation: portrait
  include_toc: true
  include_timestamps: true
  include_severity_chart: false
  date_format: "%Y-%m-%d"
  output_format: html
