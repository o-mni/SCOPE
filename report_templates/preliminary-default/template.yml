id: preliminary-default
name: Preliminary Security Assessment Report
version: "1.0"
template_type: report
builtin: true
description: >
  Default template for generating a preliminary security assessment report.
  Covers system overview, findings summary, severity breakdown, and initial
  remediation guidance based on automated and manual audit results.

sections:
  - id: cover
    title: Cover Page
    required: true
  - id: executive_summary
    title: Executive Summary
    required: true
  - id: scope_and_methodology
    title: Scope & Methodology
    required: true
  - id: system_overview
    title: System Overview
    required: false
  - id: findings
    title: Findings
    required: true
    subsections:
      - id: critical
        title: Critical Findings
      - id: high
        title: High Severity Findings
      - id: medium
        title: Medium Severity Findings
      - id: low
        title: Low Severity Findings
      - id: informational
        title: Informational
  - id: coverage
    title: Assessment Coverage
    required: true
  - id: recommendations
    title: Recommendations
    required: true
  - id: notes
    title: Analyst Notes
    required: false
  - id: disclaimer
    title: Disclaimer
    required: true

branding:
  logo: null
  primary_color: "#1a1a2e"
  accent_color: "#e94560"
  font_family: "Inter, 'Segoe UI', sans-serif"
  report_header: "SCOPE Security Assessment"
  report_footer: "Generated by SCOPE — Security Configuration Observation and Protection Engine"

severity_labels:
  critical:
    label: Critical
    color: "#c0392b"
    badge_color: "#fff"
  high:
    label: High
    color: "#e67e22"
    badge_color: "#fff"
  medium:
    label: Medium
    color: "#f1c40f"
    badge_color: "#222"
  low:
    label: Low
    color: "#2980b9"
    badge_color: "#fff"
  informational:
    label: Info
    color: "#7f8c8d"
    badge_color: "#fff"

disclaimer: >
  This report was generated automatically by the SCOPE platform based on data
  collected during the assessment window. Results reflect the system state at
  the time of assessment and may not account for changes made after that point.
  This report is intended for internal use by authorized personnel only.
  SCOPE does not guarantee the completeness or accuracy of findings and
  recommends manual verification of critical items before remediation.

render:
  page_size: A4
  orientation: portrait
  include_toc: true
  include_timestamps: true
  include_severity_chart: true
  date_format: "%Y-%m-%d %H:%M UTC"
  output_format: html
